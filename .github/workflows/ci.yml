name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go-checks:
    name: Go vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: apps/api/go.sum
      - name: go vet
        working-directory: apps/api
        run: go vet ./...
      - name: go test
        working-directory: apps/api
        run: go test ./...

  ts-checks:
    name: TypeScript typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint

  openapi-sync:
    name: OpenAPI spec / TS types in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: apps/api/go.sum
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install swag CLI (v2)
        run: go install github.com/swaggo/swag/v2/cmd/swag@latest
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Regenerate types
        run: pnpm run generate:types
      - name: Verify no drift
        run: |
          if ! git diff --exit-code -- packages/types/generated/api.ts apps/api/docs/swagger.json apps/api/docs/swagger.yaml apps/api/docs/docs.go; then
            echo ""
            echo "::error::packages/types is out of sync with the Go OpenAPI spec."
            echo "::error::Run 'pnpm run generate:types' locally and commit the changes."
            exit 1
          fi
